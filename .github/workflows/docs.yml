# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
# Builds and deploys the Jekyll docs site to GitHub Pages using the project's own
# Gemfile (Ruby 3.4.7) instead of the github-pages gem bundled by GitHub's built-in Jekyll.

name: Deploy Docs

permissions:
  contents: read
  pages: write
  id-token: write

on:
  release:
    types: [released, prereleased]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-ruby@v1
        with:
          ruby-version: "3.4.7"
          bundler-cache: true
          working-directory: docs
      - name: Build Jekyll site
        run: bundle exec jekyll build --source docs --destination docs/_site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
